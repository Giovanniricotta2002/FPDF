name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.2', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: zlib, gd
          coverage: none

      - name: Lint
        run: php -l fpdf.php

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: Run tests
        run: vendor/bin/phpunit

  static-analysis:
    name: Lint & static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: zlib, gd
          coverage: none

      - name: Install tooling dependencies
        working-directory: tools
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: PHP-CS-Fixer (PSR-12)
        run: tools/vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: PHPStan
        run: tools/vendor/bin/phpstan analyse
